<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent+ — A Brief — Newsletter Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #E4ECF2;
  color: #00070A;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Toolbar ── */
.toolbar {
  background: #0D1E2F;
  height: 52px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 2px solid #0092D1;
}
.toolbar-brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
.toolbar-logo {
  height: 26px;
  width: auto;
  flex-shrink: 0;
  display: block;
}
.toolbar-divider {
  width: 1px;
  height: 22px;
  background: #2A3B4C;
  flex-shrink: 0;
}
.toolbar-meta { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.toolbar-title { font-size: 13px; font-weight: 600; color: #F6F9FC; letter-spacing: 0.01em; white-space: nowrap; }
.toolbar-sub   { font-size: 11px; color: #97999B; letter-spacing: 0.02em; white-space: nowrap; }

.toolbar-right { display: flex; align-items: center; gap: 12px; }
.copy-toast {
  font-size: 12px;
  color: #00A997;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.copy-toast.show { opacity: 1; }
.btn-copy {
  background: #0092D1;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: background 0.15s;
}
.btn-copy:hover  { background: #0083bc; }
.btn-copy:active { background: #006fa3; }

/* ── Workspace ── */
.workspace {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Form Panel ── */
.form-panel {
  width: 400px;
  flex-shrink: 0;
  background: #fff;
  border-right: 1px solid #DDE3EA;
  overflow-y: auto;
  padding: 20px 20px 48px;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.10em;
  color: #97999B;
  padding-bottom: 8px;
  border-bottom: 1px solid #EEF2F6;
  margin-bottom: 14px;
  margin-top: 26px;
}
.section-label:first-child { margin-top: 0; }

.field { margin-bottom: 10px; }
.field:last-child { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #0D1E2F;
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.field input[type="text"],
.field input[type="number"],
.field select,
.field textarea {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid #DDE3EA;
  border-radius: 5px;
  font-size: 13px;
  font-family: inherit;
  color: #00070A;
  background: #FAFCFE;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  line-height: 1.5;
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: #0092D1;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(0,146,209,0.12);
}
.field textarea { resize: vertical; }

.field-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 10px;
}

/* ── Item Cards ── */
.items-container { margin-bottom: 10px; }

.item-card {
  background: #F8FAFC;
  border: 1px solid #DDE3EA;
  border-left: 3px solid var(--dot, #0092D1);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 8px;
}
.item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.item-num {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #97999B;
}
.btn-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: #C0C8D0;
  font-size: 14px;
  line-height: 1;
  padding: 2px 5px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.btn-remove:hover { color: #EF4444; background: #FEF2F2; }

.btn-add {
  width: 100%;
  padding: 8px 12px;
  background: #fff;
  border: 1.5px dashed #0092D1;
  border-radius: 6px;
  color: #0092D1;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}
.btn-add:hover { background: #F0F9FF; }

.img-preview {
  margin-top: 4px;
  max-width: 100%;
  max-height: 80px;
  border-radius: 4px;
  border: 1px solid #DDE3EA;
  display: block;
}
.img-wrap {
  position: relative;
  display: inline-block;
  margin-top: 4px;
}
.btn-remove-img {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #EF4444;
  color: #fff;
  border: 2px solid #fff;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 10px;
  line-height: 14px;
  text-align: center;
  cursor: pointer;
  padding: 0;
}

/* ── Preview Panel ── */
.preview-panel {
  flex: 1;
  overflow-y: auto;
  background: #E4ECF2;
  padding: 28px 24px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.preview-label {
  align-self: flex-start;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.10em;
  color: #97999B;
  margin-bottom: 10px;
}
.preview-shell {
  background: #fff;
  width: 100%;
  max-width: 700px;
  border-radius: 4px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
}
#email-preview {
  font-family: system-ui, -apple-system, sans-serif;
}
</style>
</head>

<!-- Workspace -->
<div class="workspace">

  <!-- Form Panel -->
  <aside class="form-panel">

    <div class="section-label">Issue Details</div>
    <div class="field-row">
      <div class="field">
        <label for="f-issue">Issue #</label>
        <input type="number" id="f-issue" value="1" min="1" oninput="render()">
      </div>
      <div class="field">
        <label for="f-month">Month &amp; Year</label>
        <input type="text" id="f-month" value="April 2026" placeholder="e.g. April 2026" oninput="render()">
      </div>
    </div>

    <div class="section-label">Intro / Highlights</div>
    <div class="field">
      <label for="f-intro">Welcome paragraph</label>
      <textarea id="f-intro" rows="5" placeholder="Write a short intro for this issue..." oninput="render()"></textarea>
    </div>

    <div class="section-label">Talent+ Updates</div>
    <div class="items-container" id="items-container"></div>
    <button class="btn-add" onclick="addItem()">+ Add update item</button>

    <div class="section-label">People – Talent Workspace</div>
    <div class="field">
      <label for="f-badge">Badge text</label>
      <input type="text" id="f-badge" value="Kicked off April 2026" oninput="render()">
    </div>
    <div class="field">
      <label for="f-workspace">Update paragraph</label>
      <textarea id="f-workspace" rows="5" placeholder="Describe what is happening with the Talent Workspace project this month..." oninput="render()"></textarea>
    </div>
    <div class="field">
      <label>Image (optional)</label>
      <div id="ws-img-preview"></div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
        <input type="file" accept="image/*" onchange="handleWorkspaceImage(this)" style="font-size:12px;flex:1;min-width:0;">
        <select id="f-ws-imgsize" onchange="workspaceImageSize=this.value;render();" style="width:auto;padding:4px 6px;font-size:12px;">
          <option value="100">Small</option>
          <option value="160" selected>Medium</option>
          <option value="240">Large</option>
        </select>
      </div>
    </div>

  </aside>

  <!-- Preview Panel -->
  <main class="preview-panel">
    <div class="preview-label">Live preview — email output</div>
    <div class="preview-shell">
      <div id="email-preview"></div>
    </div>
  </main>

</div>

<script>
/* ── Config ── */
const CATS = {
  system:   { label: 'System change',   color: '#0092D1' },
  process:  { label: 'Process change',  color: '#00A997' },
  behavior: { label: 'Behavior change', color: '#004976' },
};

/* ── State ── */
let items  = [];
let nextId = 0;
let LOGO_B64 = '';
let workspaceImage = '';
let workspaceImageSize = '160';

const IMG_SIZES = { '100': 'Small', '160': 'Medium', '240': 'Large' };

/* ── Helpers ── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;');
}

function nl2p(text, style) {
  const lines = (text || '').split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return '';
  return lines.map(l => `<p style="${style}">${esc(l)}</p>`).join('');
}

function buildLogoHeader() {
  if (LOGO_B64) {
    return `<table cellpadding="0" cellspacing="0" border="0" style="margin:0 0 5px 0;margin-left:auto;"><tr>
      <td style="vertical-align:middle;padding-right:10px;">
        <img src="${LOGO_B64}" width="137" height="28" alt="Talent+" style="display:block;width:137px;height:28px;">
      </td>
      <td style="vertical-align:middle;">
        <h1 style="margin:0;font-size:22px;font-weight:500;color:#0092D1;line-height:1.2;font-family:system-ui,-apple-system,sans-serif;">A Brief</h1>
      </td>
    </tr></table>`;
  }
  return `<h1 style="margin:0 0 5px 0;font-size:22px;font-weight:500;color:#0092D1;line-height:1.2;font-family:system-ui,-apple-system,sans-serif;text-align:right;">Talent+ &mdash; A Brief</h1>`;
}

/* ── Item management ── */
function addItem() {
  const id = nextId++;
  items.push({ id, category: 'system', title: '', description: '', image: '', imageSize: '160' });
  rebuildForms();
  render();
  requestAnimationFrame(() => document.getElementById(`it-title-${id}`)?.focus());
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  rebuildForms();
  render();
}

function syncItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.category    = document.getElementById(`it-cat-${id}`)?.value      ?? item.category;
  item.title       = document.getElementById(`it-title-${id}`)?.value    ?? item.title;
  item.description = document.getElementById(`it-desc-${id}`)?.value     ?? item.description;
  item.imageSize   = document.getElementById(`it-imgsize-${id}`)?.value  ?? item.imageSize;
  const card = document.getElementById(`icard-${id}`);
  if (card) card.style.setProperty('--dot', CATS[item.category]?.color ?? '#0092D1');
  render();
}

function handleItemImage(id, input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const item = items.find(i => i.id === id);
    if (item) { item.image = reader.result; rebuildForms(); render(); }
  };
  reader.readAsDataURL(file);
}

function removeItemImage(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.image = ''; rebuildForms(); render(); }
}

function handleWorkspaceImage(input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    workspaceImage = reader.result;
    render();
    updateWorkspacePreview();
  };
  reader.readAsDataURL(file);
}

function removeWorkspaceImage() {
  workspaceImage = '';
  render();
  updateWorkspacePreview();
}

function updateWorkspacePreview() {
  const el = document.getElementById('ws-img-preview');
  if (!el) return;
  el.innerHTML = workspaceImage
    ? `<div class="img-wrap"><img class="img-preview" src="${workspaceImage}"><button class="btn-remove-img" onclick="removeWorkspaceImage()" title="Remove image">&#x2715;</button></div>`
    : '';
}

function rebuildForms() {
  document.getElementById('items-container').innerHTML = items.map((item, idx) => {
    const dot = CATS[item.category]?.color ?? '#0092D1';
    return `<div class="item-card" id="icard-${item.id}" style="--dot:${dot}">
  <div class="item-header">
    <span class="item-num">Item ${idx + 1}</span>
    <button class="btn-remove" onclick="removeItem(${item.id})" title="Remove item">&#x2715;</button>
  </div>
  <div class="field">
    <label for="it-cat-${item.id}">Category</label>
    <select id="it-cat-${item.id}" onchange="syncItem(${item.id})">
      <option value="system"   ${item.category === 'system'   ? 'selected' : ''}>System change</option>
      <option value="process"  ${item.category === 'process'  ? 'selected' : ''}>Process change</option>
      <option value="behavior" ${item.category === 'behavior' ? 'selected' : ''}>Behavior change</option>
    </select>
  </div>
  <div class="field">
    <label for="it-title-${item.id}">Title</label>
    <input type="text" id="it-title-${item.id}" value="${esc(item.title)}"
      placeholder="e.g. Reference checks now in Talent+"
      oninput="syncItem(${item.id})">
  </div>
  <div class="field">
    <label for="it-desc-${item.id}">Description</label>
    <textarea id="it-desc-${item.id}" rows="2"
      placeholder="One sentence explaining what changed and why it matters."
      oninput="syncItem(${item.id})">${esc(item.description)}</textarea>
  </div>
  <div class="field" style="margin-bottom:0">
    <label>Image (optional)</label>
    ${item.image
      ? `<div class="img-wrap"><img class="img-preview" src="${item.image}"><button class="btn-remove-img" onclick="removeItemImage(${item.id})" title="Remove image">&#x2715;</button></div>`
      : ''}
    <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
      <input type="file" accept="image/*" onchange="handleItemImage(${item.id}, this)" style="font-size:12px;flex:1;min-width:0;">
      <select id="it-imgsize-${item.id}" onchange="syncItem(${item.id})" style="width:auto;padding:4px 6px;font-size:12px;">
        ${Object.entries(IMG_SIZES).map(([v,l]) => `<option value="${v}" ${item.imageSize === v ? 'selected' : ''}>${l}</option>`).join('')}
      </select>
    </div>
  </div>
</div>`;
  }).join('');
}

/* ── Read form values ── */
function vals() {
  return {
    issue:     (document.getElementById('f-issue')?.value     || '1').trim(),
    month:     (document.getElementById('f-month')?.value     || 'April 2026').trim(),
    intro:      document.getElementById('f-intro')?.value     || '',
    badge:     (document.getElementById('f-badge')?.value     || 'Kicked off April 2026').trim(),
    workspace:  document.getElementById('f-workspace')?.value || '',
    workspaceImage: workspaceImage,
    workspaceImageSize: workspaceImageSize,
    items: items.map(item => ({
      category:    item.category,
      title:       document.getElementById(`it-title-${item.id}`)?.value ?? item.title,
      description: document.getElementById(`it-desc-${item.id}`)?.value  ?? item.description,
      image:       item.image || '',
      imageSize:   item.imageSize || '160',
    })),
  };
}

/* ── Email HTML builders ── */

  }
  return itemsData.map(item => {
    const title = esc(item.title)       || '<em style="color:#97999B;">Untitled</em>';
    const desc  = esc(item.description) || '';
    const textHTML = `
      <p style="margin:0 0 3px 0;font-size:14px;font-weight:600;color:#0D1E2F;line-height:1.4;">${title}</p>
      ${desc ? `<p style="margin:0;font-size:14px;font-weight:400;color:#00070A;line-height:1.7;">${desc}</p>` : ''}`;

    if (item.image) {
      return `<tr>
  <td style="padding:12px 0;border-bottom:1px solid #EDF2F7;vertical-align:top;">
    <table cellpadding="0" cellspacing="0" border="0" width="100%"><tr>
      <td style="vertical-align:top;font-family:system-ui,-apple-system,sans-serif;">${textHTML}</td>
      <td width="${item.imageSize}" style="vertical-align:top;padding-left:16px;">

</tr>`;
    }

    return `<tr>
  <td style="padding:12px 0;border-bottom:1px solid #EDF2F7;vertical-align:top;font-family:system-ui,-apple-system,sans-serif;">${textHTML}
  </td>

  }).join('\n');
}

/* ── Render & Copy ── */
function render() {
  document.getElementById('email-preview').innerHTML = buildEmailBody(vals());
}

function copyForGmail() {
  const html = buildEmailBody(vals());
  const blob = new Blob([html], { type: 'text/html' });
  const textBlob = new Blob([html], { type: 'text/plain' });
  const item = new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob });
  navigator.clipboard.write([item]).then(showToast).catch(() => {
    fallbackRichCopy(html);
  });
}

function fallbackRichCopy(html) {
  const el = document.createElement('div');
  el.innerHTML = html;
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(el);
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try { document.execCommand('copy'); showToast(); }
  catch(e) { alert('Copy failed. Please try the HTML button instead.'); }
  sel.removeAllRanges();
  document.body.removeChild(el);
}

function copyHTML() {
  const html = buildFullHTML(vals());
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(html).then(showToast).catch(() => fallbackCopy(html));
  } else {
    fallbackCopy(html);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast(); }
  catch(e) { alert('Copy failed. Please copy the HTML manually.'); }
  document.body.removeChild(ta);
}

function showToast() {
  const t = document.getElementById('copy-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
